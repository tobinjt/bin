#!/usr/bin/env -S "populate_pre_commit"
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  # managed-by-populate-pre-commit start: basedpyright.yaml
  - repo: local
    hooks:
    - id: basedpyright
      name: Run `basedpyright`
      language: system
      types:
      - python
      entry: basedpyright
  # managed-by-populate-pre-commit end: basedpyright.yaml
  # managed-by-populate-pre-commit start: black.yaml
  - repo: local
    hooks:
    - id: black
      name: Run `black`
      language: system
      types:
      - python
      entry: black
  # managed-by-populate-pre-commit end: black.yaml
  # managed-by-populate-pre-commit start: conventional-pre-commit.yaml
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
    - id: conventional-pre-commit
      stages:
      - commit-msg
      args:
      - --verbose
  # managed-by-populate-pre-commit end: conventional-pre-commit.yaml
  # managed-by-populate-pre-commit start: hooks.yaml
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    - id: check-case-conflict
    - id: check-executables-have-shebangs
    - id: check-illegal-windows-names
    - id: check-merge-conflict
    - id: check-vcs-permalinks
    - id: check-yaml
    - id: destroyed-symlinks
    - id: fix-byte-order-marker
    - id: mixed-line-ending
  # managed-by-populate-pre-commit end: hooks.yaml
  # managed-by-populate-pre-commit start: json.yaml
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    - id: check-json
      exclude: ^\.vscode/settings\.json$
    - id: pretty-format-json
      exclude: ^\.vscode/settings\.json$
      args:
      - --autofix
  # managed-by-populate-pre-commit end: json.yaml
  # managed-by-populate-pre-commit start: keep-sorted.yaml
  - repo: https://github.com/google/keep-sorted
    rev: v0.8.0
    hooks:
    - id: keep-sorted
  # managed-by-populate-pre-commit end: keep-sorted.yaml
  # managed-by-populate-pre-commit start: markdownlint.yaml
  - repo: local
    hooks:
    - id: markdownlint
      name: Run `markdownlint`
      language: system
      types:
      - markdown
      exclude: CODE_OF_CONDUCT.md
      entry: markdownlint
  # managed-by-populate-pre-commit end: markdownlint.yaml
  # managed-by-populate-pre-commit start: meta.yaml
  - repo: meta
    hooks:
    - id: check-hooks-apply
  # managed-by-populate-pre-commit end: meta.yaml
  # managed-by-populate-pre-commit start: mypy.yaml
  - repo: local
    hooks:
    - id: mypy
      name: Run `mypy`
      language: system
      types:
      - python
      entry: mypy --ignore-missing-imports --scripts-are-modules
  # managed-by-populate-pre-commit end: mypy.yaml
  # managed-by-populate-pre-commit start: pygrep-hooks.yaml
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
    - id: python-check-blanket-noqa
    - id: python-check-blanket-type-ignore
    - id: python-check-mock-methods
    - id: python-no-eval
    - id: python-no-log-warn
    - id: python-use-type-annotations
  # managed-by-populate-pre-commit end: pygrep-hooks.yaml
  # managed-by-populate-pre-commit start: pytest.yaml
  - repo: local
    hooks:
    - id: pytest
      name: Run `pytest`
      language: system
      pass_filenames: false
      types:
      - python
      entry: pytest
  # managed-by-populate-pre-commit end: pytest.yaml
  # managed-by-populate-pre-commit start: python.yaml
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    - id: debug-statements
  # managed-by-populate-pre-commit end: python.yaml
  # managed-by-populate-pre-commit start: shellcheck.yaml
  - repo: local
    hooks:
    - id: shellcheck
      name: Run `shellcheck`
      language: system
      types:
      - shell
      entry: shellcheck -e SC1090 -e SC1091
  # managed-by-populate-pre-commit end: shellcheck.yaml
  # managed-by-populate-pre-commit start: spellcheck.yaml
  - repo: local
    hooks:
    - id: spellcheck
      stages:
      - commit-msg
      name: Check spelling
      language: system
      verbose: true
      entry: spell-check-wrapper
  # managed-by-populate-pre-commit end: spellcheck.yaml
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-builtin-literals
        files: python/.*\.py$
      - id: check-docstring-first
        files: python/.*\.py$
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: debug-statements
        files: python/.*\.py$
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: local
    hooks:
      # keep-sorted start
      - id: actionlint
        name: Run `actionlint`
        language: system
        types: [yaml]
        exclude: dependabot.yml|.*.yaml$
        entry: actionlint
      - id: linkdirs-system-python-test
        name: Run `linkdirs_test_with_system_python.sh`
        language: system
        files: python/linkdirs.*
        entry: ./python/linkdirs_test_with_system_python.sh
      - id: pytest - triggered by Github workflows changing
        name: Run `pytest` when Github workflows change
        language: system
        pass_filenames: false
        types: [yaml]
        entry: pytest
      - id: run-everywhere-system-python-test
        name: Run `run_everywhere_test_with_system_python.sh`
        language: system
        files: python/run_everywhere.*
        entry: ./python/run_everywhere_test_with_system_python.sh
      # keep-sorted end
