name: Code Quality

on:
  push:
    branches: [ "main" ]
    paths:
      - '**.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'

permissions:
  contents: read

jobs:
  pre-commit-checks:
    name: |
      Runs `cargo build`, `cargo check`, `cargo clippy`, `cargo fmt`,
      `cargo llvm-cov test`, and `cargo test`,
      Commits any changes made by `cargo fmt`.
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push new commits.
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          # Ensure we are on the PR branch, not a detached head
          ref: ${{ github.head_ref }}
          # Required to push new commits.
          persist-credentials: true

      - name: Install Rust toolchain
        run: rustup toolchain install --component clippy
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # keep-sorted start block=true
      - name: Run cargo build
        run: cargo build --all-features
      - name: Run cargo check
        run: cargo check
      - name: Run cargo clippy
        run: cargo clippy -- --deny warnings
      - name: Run cargo fmt
        run: cargo fmt
      - name: Run cargo llvm-cov test
        run: cargo llvm-cov test
      - name: Run cargo test
        run: cargo test --all-features
      # keep-sorted end

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7.2.0
        with:
          commit_message: "style: automatic rustfmt fixes"
          file_pattern: 'src/**/*.rs'
