name: Go CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          # Ensure we are on the PR branch, not a detached head
          ref: ${{ github.head_ref }}
          # Required to push new commits.
          persist-credentials: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true # Automatically caches Go modules and build cache

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Check Imports
        run: |
          goimports .

      - name: Check Formatting
        run: |
          go fmt .

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "style: automatic fixes"
          file_pattern: '*.go'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9

      - name: Govulncheck
        uses: golang/govulncheck-action@v1
        with:
          repo-checkout: false

      - name: Run Tests
        run: go test -v -parallel=8 -race -coverprofile=coverage.out ./...
