name: Publish to crates.io if tests pass.

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  check_and_publish:
    name: Perform tests and publish to crates.io.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Ensure we are on the PR branch, not a detached head
          ref: ${{ github.head_ref }}
          persist-credentials: false
      - name: Install Rust toolchain
        run: rustup toolchain install --component clippy
      # keep-sorted start block=true
      - name: Run cargo build
        run: cargo build --all-features
      - name: Run cargo check
        run: cargo check
      - name: Run cargo clippy
        run: cargo clippy -- --deny warnings
      - name: Run cargo fmt
        run: cargo fmt --check
      - name: Run cargo test
        run: cargo test --all-features
      # keep-sorted end
      - name: Cargo Publish
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
